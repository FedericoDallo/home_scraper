name: Limpiar archivos viejos del cache (diario)

on:
  schedule:
    - cron: "0 3 * * *"  # todos los días a las 03:00 UTC
  workflow_dispatch:

jobs:
  clear-cache:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2

      - name: Instalar dependencias
        run: |
          gem install bundler
          bundle install

      - name: Configurar claves
        run: |
          mkdir -p config
          echo "$RAILS_MASTER_KEY" > config/master.key

      - name: Ejecutar limpieza de cache
        run: bundle exec rails clear_cache:clean_old
        env:
          RAILS_ENV: production
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
